<style>
:root{
    --primary:#003d82;
    --primary-dark:#002a5e;
    --primary-light:#1a5cb5;
    --accent:#d4af37;
    --surface:#ffffff;
    --text-primary:#1a1a2e;
    --text-secondary:#6b7280;
    --border:#e5e7eb;
    --radius:22px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html{
    height:100%;
    scroll-behavior:smooth;
}

body{
    min-height:100dvh;
    font-family:'Inter','Noto Sans Khmer',sans-serif;
    background:linear-gradient(180deg,#eef4ff 0%,#dfe8f7 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:
        max(14px,env(safe-area-inset-top))
        max(14px,env(safe-area-inset-right))
        max(14px,env(safe-area-inset-bottom))
        max(14px,env(safe-area-inset-left));
    overflow-x:hidden;
}

/* CARD */

.card{
    width:100%;
    max-width:430px;
    background:var(--surface);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:
        0 20px 60px rgba(0,0,0,0.12),
        0 0 0 1px rgba(0,0,0,0.04);
    transition:all .3s ease;
}

/* HEADER */

.header{
    position:relative;
    padding:24px 22px 38px;
    text-align:center;
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--primary-dark)
    );
}

.header::after{
    content:'';
    position:absolute;
    left:0;
    right:0;
    bottom:-1px;
    height:28px;
    background:white;
    border-radius:26px 26px 0 0;
}

.avatar-wrap{
    position:relative;
    display:inline-flex;
    margin-bottom:12px;
}

.avatar{
    width:clamp(72px,18vw,96px);
    height:clamp(72px,18vw,96px);
    border-radius:50%;
    object-fit:cover;
    border:4px solid rgba(255,255,255,0.22);
}

.status-dot{
    position:absolute;
    bottom:4px;
    right:4px;
    width:16px;
    height:16px;
    border-radius:50%;
    background:#22c55e;
    border:3px solid var(--primary);
}

.name{
    color:white;
    font-size:clamp(20px,4vw,28px);
    font-weight:800;
}

.title{
    margin-top:6px;
    color:#f5d97b;
    font-size:11px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
}

.company-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:12px;
    padding:6px 14px;
    border-radius:999px;
    background:rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.95);
    font-size:12px;
}

/* BODY */

.body{
    flex:1;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

/* QUICK ACTIONS */

.quick-actions,
.social-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.q-btn,
.social-btn{
    background:#f8fafc;
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px 10px;
    text-decoration:none;
    color:inherit;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:.2s ease;
}

.q-btn:hover,
.social-btn:hover{
    transform:translateY(-2px);
    border-color:var(--primary-light);
}

.q-icon{
    width:42px;
    height:42px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

.q-icon.call{background:rgba(34,197,94,0.12);}
.q-icon.email{background:rgba(59,130,246,0.12);}
.q-icon.save{background:rgba(212,175,55,0.12);}

.q-label,
.social-btn span{
    font-size:12px;
    font-weight:600;
    color:var(--text-secondary);
}

/* INFO */

.info-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.info-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px;
    border-radius:16px;
    background:#f8fafc;
    border:1px solid var(--border);
    text-decoration:none;
    color:inherit;
    transition:.2s ease;
}

.info-row:hover{
    transform:translateX(2px);
    border-color:var(--accent);
}

.info-row .icon{
    width:42px;
    height:42px;
    border-radius:12px;
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--primary-light)
    );
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--accent);
    flex-shrink:0;
}

.detail{
    flex:1;
    min-width:0;
}

.lbl{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#b8941f;
    font-weight:700;
}

.val{
    font-size:14px;
    font-weight:600;
    color:var(--text-primary);
    overflow-wrap:anywhere;
}

/* SAVE BUTTON */

.save-btn{
    width:100%;
    border:none;
    border-radius:16px;
    padding:15px;
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--primary-dark)
    );
    color:var(--accent);
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:.2s ease;
}

.save-btn:hover{
    transform:translateY(-2px);
}

/* FOOTER */

.footer{
    text-align:center;
    padding-top:4px;
}

.footer p{
    font-size:11px;
    color:#94a3b8;
}

/* TOAST */

.toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(80px);
    background:#111827;
    color:white;
    padding:12px 20px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    opacity:0;
    transition:.3s ease;
    z-index:999;
}

.toast.show{
    transform:translateX(-50%) translateY(0);
    opacity:1;
}

/* LANDSCAPE */

@media (orientation:landscape) and (max-width:950px){

    body{
        align-items:stretch;
    }

    .card{
        max-width:100%;
        width:100%;
        flex-direction:row;
    }

    .header{
        width:38%;
        display:flex;
        flex-direction:column;
        justify-content:center;
        padding:30px 20px;
    }

    .header::after{
        display:none;
    }

    .body{
        width:62%;
        overflow-y:auto;
    }
}

/* TABLET */

@media (min-width:768px){

    .card{
        max-width:900px;
    }

    .body{
        padding:24px;
    }
}

/* SMALL DEVICES */

@media (max-width:420px){

    .body{
        padding:14px;
    }

    .q-btn,
    .social-btn{
        padding:12px 8px;
    }

    .info-row{
        padding:12px;
    }

    .val{
        font-size:13px;
    }
}

/* DARK MODE */

@media (prefers-color-scheme:dark){

    body{
        background:linear-gradient(
            180deg,
            #0f172a,
            #1e293b
        );
    }

    .card{
        background:#1e293b;
    }

    .header::after{
        background:#1e293b;
    }

    .q-btn,
    .social-btn,
    .info-row{
        background:#334155;
        border-color:#475569;
    }

    .val{
        color:#f8fafc;
    }

    .footer p{
        color:#94a3b8;
    }
}
</style>

<script>
let toastT;

function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;

    toastT=setTimeout(()=>{
        t.classList.remove('show');
    },2000);
}

function downloadVCard(){

URL:https://www.facebook.com/theavy.lau
END:VCARD`;

const blob=new Blob([vcard],{
    type:'text/vcard;charset=utf-8'
});

const url=URL.createObjectURL(blob);

const a=document.createElement('a');

a.href=url;
a.download='Chheung_Sokuntheavy.vcf';

document.body.appendChild(a);
a.click();

setTimeout(()=>{
    URL.revokeObjectURL(url);
    a.remove();
},100);

showToast('Contact saved!');
}
</script>
